apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd

  template:
    metadata:
      labels:
        app: cicd

    spec:
      containers:
      - name: cicd-container
        image: cicd-project
        ports:
        - containerPort: 3000